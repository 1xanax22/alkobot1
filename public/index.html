<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Не пью!</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <!-- Главный экран (таймер и друзья) -->
        <div id="homeScreen" class="screen active">
            <h1>Не пью!</h1>
            <div id="timer" class="timer">Нажми "Старт"</div>
            <div class="button-group">
                <button id="startBtn">Старт</button>
                <button id="resetBtn" style="display: none;">Сбросить</button>
            </div>
            <h2>Мои друзья</h2>
            <ul id="friendsList"></ul>
            <div class="input-group">
                <input type="text" id="friendUsername" placeholder="Введи ник друга (@ или без)">
                <button id="addFriendBtn">Добавить</button>
            </div>
            <button id="inviteFriendBtn" class="invite-btn">Пригласить друга</button>
        </div>

        <!-- Экран статистики -->
        <div id="statsScreen" class="screen">
            <h2>Статистика</h2>
            <div id="statsContent"></div>
        </div>

        <!-- Навигация -->
        <nav class="bottom-nav">
            <button id="navHome" class="nav-btn active">Главная</button>
            <button id="navStats" class="nav-btn">Статистика</button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
